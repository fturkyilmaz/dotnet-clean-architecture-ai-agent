name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore CleanArchitectureAI.slnx
    
    - name: Build
      run: dotnet build CleanArchitectureAI.slnx --configuration Release --no-restore
    
    - name: Test
      run: dotnet test CleanArchitectureAI.slnx --configuration Release --no-build --verbosity normal

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/Presentation/UI/package-lock.json
    
    - name: Install dependencies
      working-directory: src/Presentation/UI
      run: npm ci
    
    - name: Lint
      working-directory: src/Presentation/UI
      run: npm run lint
    
    - name: Build
      working-directory: src/Presentation/UI
      run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-api, build-ui]
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker images
      run: |
        docker compose -f deploy/docker-compose.yml build
    
    - name: Login to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Push images
      if: github.event_name == 'push'
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/clean-arch-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/clean-arch-ui:latest
